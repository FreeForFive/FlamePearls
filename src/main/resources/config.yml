# -------------------------------------------
# FlamePearls General Configuration
# -------------------------------------------

# --- Gameplay Mechanics ---

# Controls all endermite behavior caused by ender pearls.
# enabled: false disables endermites by default.
# chance: chance from 0.0 to 1.0 for FlamePearls to spawn one endermite when enabled.
endermites:
  enabled: false
  chance: 0.05

# If true, right-clicking a block with an ender pearl is cancelled.
# Default false keeps block-click pearl behavior allowed.
prevent-pearl-on-click-block: false

# Prevents players from taking fall damage that was accumulated before they teleported.
reset-fall-damage-after-teleport: true

# Makes a player briefly immune to damage after teleporting (in server ticks, 20 ticks = 1 second).
teleport-no-damage-ticks: 5

# Enable the max-ticks-alive cleanup task (true = enabled, false = disabled).
max-ticks-alive-enabled: true

# The maximum amount of time a pearl can be alive (in server ticks, 20 ticks = 1 second).
max-ticks-alive: 1200

# Prevents players from teleporting to a location outside of the world border.
prevent-world-border-teleport: true

# --- Damage & Cooldowns ---

# Damage dealt to the player who throws the pearl (in half-hearts).
pearl-damage-self: 5.0 # 2.5 hearts

# Damage dealt to other entities hit by the pearl (in half-hearts).
pearl-damage-other: 2.0 # 1 heart

cooldown:
  # Enables plugin cooldown enforcement.
  enabled: true
  # The default cooldown in seconds for players without a tier permission.
  time: 10.0
  # Permission-based cooldowns. Players get the LOWEST value they have permission for.
  # The permission node is flamepearls.cooldown.<number>
  # It's best practice to keep this list sorted from lowest to highest.
  permission-tiers:
    - 1
    - 2
    - 3
    - 5

# --- Cosmetics & World Control ---

# Sound played on a successful pearl teleport.
pearl-sound:
  - "ENDERMAN_TELEPORT"
  - "ENTITY_ENDERMAN_TELEPORT"

# Pearls will behave like vanilla (including glitching) in these worlds.
disabled-worlds:
  - "disabled_world"

# Whether to reset a player's velocity to zero after teleporting.
reset-velocity-after-teleport: true

# Maximum allowed distance (in blocks) for pearl teleports.
# Set to 0 or a negative value to disable the distance limit.
max-teleport-distance: 500.0

# Prevent pearl teleports from switching worlds when true.
# If true, pearls thrown in one world will not teleport you to another world.
prevent-world-switch-teleport: true

messages:
  no-permission: "&cYou require the permission&e '{permission}'&c to use this command!"
  reloaded: "&aFlamePearls by ArkFlame Development was reloaded!"
  cooldown: "&cWait &e{time}s&c to throw another pearl!"
  teleport-distance-exceeded: "&cTeleport blocked: distance &e{distance}&c > &e{limit}"
  teleport-world-switch-blocked: "&cYou cannot teleport from world {from} to {to}!"
  stats: |-
    &r 
    &aFlamePearls by ArkFlame Development
    &r 
    &8 » &ePearls Damage: &f{damage}&c♥
    &8 » &ePearls Damage &7(Self)&e: &f{damage-self}&c♥
    &8 » &ePearls Cooldown: &f{cooldown}s
    &r 
    &8 » &ePearls Thrown: &6{thrown}
    &r